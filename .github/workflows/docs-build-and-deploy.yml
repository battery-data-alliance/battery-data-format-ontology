name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

# One docs build per ref at a time. A newer push to main cancels an
# in-progress build so the most recent commit is always deployed.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and deploy documentation
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required by peaceiris/actions-gh-pages

    steps:
      - name: Checkout (full history for tag enumeration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-docs-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-docs-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[docs]"

      - name: Install system dependencies (pandoc)
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends pandoc

      - name: Set build environment variables
        id: set-env
        run: |
          python .github/scripts/ontology_toolkit.py --print-env >> $GITHUB_ENV
          echo "doc_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Generate RST documentation from TTL
        env:
          ONLY_LOCAL_IMPORTS: "1"
        run: python .github/scripts/ontology_toolkit.py --generate-rst

      - name: Build HTML with Sphinx (warnings as errors)
        run: sphinx-build -b html -W --keep-going docs/ docs/_build/html/

      - name: Fetch FOOPS score and generate badge SVG
        # Non-fatal: a transient outage of foops.linkeddata.es must not block deployment.
        # The badge SVG is written to docs/assets/ and picked up by the assets copy below.
        continue-on-error: true
        run: python .github/scripts/foops_toolkit.py --generate-badge

      - name: Prepare deploy directory structure
        run: mkdir -p docs/_build/html/{context,schema,assets,versions}

      - name: Copy static assets, context, and schema to build output
        run: |
          cp -r docs/assets/. docs/_build/html/assets/ 2>/dev/null || true
          cp context/context.json docs/_build/html/context/
          cp schema/schema.json   docs/_build/html/schema/

      - name: Apply FOOPS recommendations to TTL files
        run: |
          for FILE in $(python .github/scripts/ontology_toolkit.py --print-ttl-files); do
            if [ -f "$FILE" ]; then
              OUTPUT="${FILE%.ttl}-foops.ttl"
              python .github/scripts/foops_toolkit.py --apply-to-file "$FILE" "$OUTPUT"
              cp "$OUTPUT" "docs/_build/html/$(basename "$FILE")"
            fi
          done

      - name: Copy versioned artefacts for each git tag
        run: |
          while IFS= read -r TAG; do
            [ -z "$TAG" ] && continue
            echo "Processing tag: $TAG"
            mkdir -p "docs/_build/html/versions/$TAG/context"
            mkdir -p "docs/_build/html/versions/$TAG/schema"
            git show "$TAG:battery-data-format.ttl"    > "docs/_build/html/versions/$TAG/battery-data-format.ttl"    2>/dev/null || true
            git show "$TAG:context/context.json"        > "docs/_build/html/versions/$TAG/context/context.json"        2>/dev/null || true
            git show "$TAG:schema/schema.json"          > "docs/_build/html/versions/$TAG/schema/schema.json"          2>/dev/null || true
          done < <(git tag)

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: "bdf-ontology-docs-${{ steps.set-env.outputs.doc_date }}"
          path: docs/_build/html/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html/
