name: ci

on:
  pull_request:
  push:
    branches: [main, dev]

# Read-only access is sufficient for validation and testing.
permissions:
  contents: read

jobs:
  validate:
    name: Validate ontology artefacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Validate TTL, JSON, YAML and schema content
        run: python .github/scripts/validate.py

      - name: Run ontology tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  check-context:
    name: Check context.json is not stale
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Regenerate context and diff against committed version
        run: |
          cp context/context.json context/context.json.committed
          python .github/scripts/ontology_toolkit.py --generate-context
          if ! diff -u context/context.json.committed context/context.json; then
            echo ""
            echo "ERROR: context/context.json is stale."
            echo "Regenerate and commit:"
            echo "  python .github/scripts/ontology_toolkit.py --generate-context"
            exit 1
          fi
          echo "context/context.json is up to date."
